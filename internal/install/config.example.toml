listen_addr = "[::1]:8080"
runner_count = 3
max_idle = "2h"
max_age = "24h"

labels = ["self-hosted", "macOS", "ARM64", "agk-local-macos-26"]

allowed_repos = [
  "agoodkind/lmd",
  "agoodkind/iphone-cell-tunnel",
  "agoodkind/macos-fan-curve",
  "agoodkind/macos-smc-fan",
  "agoodkind/stickies-improved",
  "agoodkind/swift-makefile",
]

# Paths are read verbatim with no shell tilde expansion, so use absolute paths
# (replace "you" with your username).
[app]
app_id              = "REPLACE_WITH_APP_ID"
private_key_path    = "/Users/you/.config/gha-mac-broker/app-private-key.pem"
webhook_secret_path = "/Users/you/.config/gha-mac-broker/webhook-secret"
capacity_token_path = "/Users/you/.config/gha-mac-broker/capacity-token"
webhook_cidrs_path  = "/Users/you/.config/gha-mac-broker/github-webhook-cidrs.txt"

[tart]
binary         = "tart"
base_image     = "ghcr.io/cirruslabs/macos-tahoe-xcode:26.5"
# warm_budget is parsed for compatibility with older configs. runner_count now
# controls worker capacity.
warm_budget    = 2
golden_budget  = 3
vm_name_prefix = "gha-runner"
# cache_dir is mounted into every VM (guest /Volumes/My Shared Files/cache) so the
# build cache survives VM deletion. Keep it dedicated; do NOT point it at tart's
# own store. Empty defaults to <home>/pool-cache, or a temp dir if the home
# dir cannot be resolved.
cache_dir      = "/Users/you/pool-cache"
# Fast base-image pull through skopeo into a loopback OCI registry. Defaults shown.
fast_pull            = true
fast_pull_parallel   = 16
# fast_pull_dir holds the multi-GB base-image blobs and defaults to a temp dir,
# kept out of cache_dir so it is never mounted into a build VM.
# fast_pull_parallel is how many image layers skopeo pulls at once (default 16).
# Control of each VM (readiness, job execution, liveness) runs over the
# tart-exec vsock channel, so there is no SSH key, user, or VM network config
# here. The VM keeps tart's default NAT only for its own IPv4 egress to GitHub.

[[tart.images]]
macos = "tahoe"
xcode = "26.5"
tag   = "ghcr.io/cirruslabs/macos-tahoe-xcode:26.5"

[maintenance]
# A shell command run on an interval by a launchd timer the installer provisions.
# Empty disables the timer. The default bounds the shared pool build cache: it updates
# swift-mk to the latest signed release, then prunes the cache to a size cap.
command = "swift-mk update apply || true; exec swift-mk cache prune --max-bytes 53687091200 --path /Users/you/pool-cache"
interval_seconds = 3600
