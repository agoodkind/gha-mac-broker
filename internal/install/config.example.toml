listen_addr = "[::1]:8080"

labels = ["self-hosted", "macOS", "ARM64", "agk-local-macos-26"]

allowed_repos = [
  "agoodkind/lmd",
  "agoodkind/iphone-cell-tunnel",
  "agoodkind/macos-fan-curve",
  "agoodkind/macos-smc-fan",
  "agoodkind/stickies-improved",
  "agoodkind/swift-makefile",
]

# Paths are read verbatim with no shell tilde expansion, so use absolute paths
# (replace "you" with your username).
[app]
app_id              = "REPLACE_WITH_APP_ID"
private_key_path    = "/Users/you/.config/gha-mac-broker/app-private-key.pem"
webhook_secret_path = "/Users/you/.config/gha-mac-broker/webhook-secret"
capacity_token_path = "/Users/you/.config/gha-mac-broker/capacity-token"
webhook_cidrs_path  = "/Users/you/.config/gha-mac-broker/github-webhook-cidrs.txt"

[tart]
binary         = "tart"
base_image     = "ghcr.io/cirruslabs/macos-tahoe-xcode:26.5"
warm_budget    = 2
golden_budget  = 3
vm_name_prefix = "gha-runner"
cache_dir      = "/Users/you/.tart/cache"
# Control of each VM (readiness, job execution, liveness) runs over the
# tart-exec vsock channel, so there is no SSH key, user, or VM network config
# here. The VM keeps tart's default NAT only for its own IPv4 egress to GitHub.

[[tart.images]]
macos = "tahoe"
xcode = "26.5"
tag   = "ghcr.io/cirruslabs/macos-tahoe-xcode:26.5"
