name: CI
on:
  push:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  go:
    # macOS runner: the broker links a static libaria2 with AppleTLS plus the
    # Security/CoreFoundation frameworks via CGO, which only builds and links on
    # darwin. The broker is a darwin-only tool, so its CI runs there too.
    uses: agoodkind/go-makefile/.github/workflows/_ci.yml@main
    with:
      runs_on: macos-latest
      # macOS build signs the output binary; CI has no Developer ID cert, so
      # sign ad-hoc. Real Developer ID signing happens in the release via quill.
      pre_make_commands: |
        echo "CODESIGN_IDENTITY=-" >> "$GITHUB_ENV"
    permissions:
      contents: read
      id-token: write
